<script async defer src="https://buttons.github.io/buttons.js"></script>
<script>
	document.addEventListener("DOMContentLoaded", function () {
		var publicationLinkMap = {
			tensorfhe: "https://arxiv.org/pdf/2212.14191",
			maverick: "https://dl.acm.org/doi/pdf/10.1145/3779212.3790186",
			peregrine: "https://ieeexplore.ieee.org/abstract/document/11408517/",
			chameleon: "https://ieeexplore.ieee.org/iel8/71/4359390/11146703.pdf",
			neo: "https://dl.acm.org/doi/pdf/10.1145/3695053.3731408",
			shiftpir: "https://dl.acm.org/doi/pdf/10.1145/3719027.3765153",
			batchboot: "https://www.usenix.org/system/files/conference/usenixsecurity26/sec26_prepub_li-zhihao.pdf",
			"he-booster": "https://ieeexplore.ieee.org/iel7/71/4359390/10012383.pdf",
			herds: "https://eprint.iacr.org/2025/1804.pdf",
			nttfusion: "https://ieeexplore.ieee.org/abstract/document/10360966/",
			tches2024: "https://incs.ub.rub.de/index.php/TCHES/article/download/11683/11203",
			boot_survey: "https://link.springer.com/article/10.1186/s42400-026-00571-w",
			bootsurvey: "https://link.springer.com/article/10.1186/s42400-026-00571-w"
		};

		// Rewrite publication detail links to external paper URLs.
		document.querySelectorAll('a[href*="/publications/"]').forEach(function (a) {
			var href = a.getAttribute("href") || "";
			var m = href.match(/\/publications\/([^\/#?]+)\/?/i);
			if (!m || !m[1]) {
				return;
			}
			var slug = m[1].toLowerCase();
			var targetUrl = publicationLinkMap[slug];
			if (!targetUrl) {
				return;
			}
			a.setAttribute("href", targetUrl);
			a.setAttribute("target", "_blank");
			a.setAttribute("rel", "noopener noreferrer");
			a.style.color = "#1d4ed8";
		});

		// Remove clickable author links in citation view and keep names as plain text.
		document.querySelectorAll(".li-cite-author a").forEach(function (a) {
			var textNode = document.createTextNode(a.textContent || "");
			a.replaceWith(textNode);
		});

		// Bold only the target author name in publication citation author lines.
		document.querySelectorAll(".li-cite-author").forEach(function (authorLine) {
			authorLine.innerHTML = authorLine.innerHTML.replace(
				/\bZhiwei Wang\b/g,
				"<strong>Zhiwei Wang</strong>"
			);
			authorLine.innerHTML = authorLine.innerHTML.replace(
				/\bRui Hou\b/g,
				"<span style=\"color:#2563eb\">Rui Hou</span>"
			);
		});

		// Remove footnote-like markers such as (0001).
		document.querySelectorAll(".li-cite-author").forEach(function (authorLine) {
			var sibling = authorLine.nextSibling;
			while (sibling) {
				if (sibling.nodeType === Node.TEXT_NODE) {
					sibling.textContent = (sibling.textContent || "").replace(/\(\d{4}\)\.?/g, "");
				}
				sibling = sibling.nextSibling;
			}
		});

		// Group citation items by publication year and show newest year first.
		var citationItems = Array.from(document.querySelectorAll(".pub-list-item.view-citation"));
		var parentToItems = new Map();
		citationItems.forEach(function (item) {
			var parent = item.parentElement;
			if (!parent) {
				return;
			}
			if (!parentToItems.has(parent)) {
				parentToItems.set(parent, []);
			}
			parentToItems.get(parent).push(item);
		});

		parentToItems.forEach(function (items, parent) {
			if (items.length === 0) {
				return;
			}

			var groups = {};
			items.forEach(function (item) {
				var yearText = (item.querySelector("em") || item).textContent || "";
				var yearMatch = yearText.match(/\b(19|20)\d{2}\b/);
				var year = yearMatch ? yearMatch[0] : "Other";
				if (!groups[year]) {
					groups[year] = [];
				}
				groups[year].push(item);
			});

			var years = Object.keys(groups).sort(function (a, b) {
				if (a === "Other") {
					return 1;
				}
				if (b === "Other") {
					return -1;
				}
				return parseInt(b, 10) - parseInt(a, 10);
			});

			parent.innerHTML = "";
			years.forEach(function (year) {
				var heading = document.createElement("div");
				heading.className = "pub-year-heading";
				heading.style.margin = "0.75rem 0 0.25rem";
				heading.style.fontWeight = "700";
				heading.style.fontSize = "1.125rem";
				heading.textContent = year;
				parent.appendChild(heading);

				groups[year].forEach(function (item) {
					parent.appendChild(item);
				});
			});
		});

		// Match the Interests badge text size to the Education heading scale.
		document.querySelectorAll('#section-resume-biography-3 .flex.flex-wrap.gap-3 .inline-block').forEach(function (item) {
			item.style.fontSize = '1.25rem';
			item.style.lineHeight = '1.75rem';
			item.style.fontWeight = '700';
		});

		// Hide the Education block on the homepage bio section.
		document.querySelectorAll('#section-resume-biography-3 h3').forEach(function (heading) {
			if ((heading.textContent || '').trim() !== 'Education') {
				return;
			}
			var educationBlock = heading.closest('div.mb-16');
			if (educationBlock) {
				educationBlock.style.display = 'none';
			}
		});
	});
</script>
